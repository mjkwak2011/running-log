services:
  - type: web
    name: running-log
    runtime: node
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    plan: free
    envVars:
      - key: TURSO_URL
        sync: false
      - key: TURSO_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
